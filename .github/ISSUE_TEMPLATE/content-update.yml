name: Homepage content update
description: Submit information to update the academic homepage
title: "Content update: "
labels:
  - content
body:
  - type: markdown
    attributes:
      value: |
        Use this form to provide confirmed information for the academic homepage.
        Leave unrelated fields blank and include authoritative links whenever possible.
  - type: textarea
    id: profile
    attributes:
      label: Profile updates
      description: Name, title, affiliation, office, email, links, or biography changes.
      placeholder: |
        English bio:
        Chinese bio:
        Affiliation:
        Office:
    validations:
      required: false
  - type: textarea
    id: news
    attributes:
      label: News
      description: Add newest items first. Include the display month and year.
      placeholder: |
        2026.06: ...
        2026.05: ...
    validations:
      required: false
  - type: textarea
    id: publications
    attributes:
      label: Publications
      description: Include title, complete author order, venue, year, CCF rank, publication type, and links.
      placeholder: |
        Title:
        Authors:
        Venue:
        Year:
        CCF rank (A/B/T1/Other):
        Type (journal/conference):
        Paper link:
        Code link:
        Note:
    validations:
      required: false
  - type: textarea
    id: awards_services
    attributes:
      label: Awards and academic services
      description: Include the official English name, organization, role, and year where applicable.
      placeholder: |
        Honors and awards:
        Academic services:
    validations:
      required: false
  - type: textarea
    id: mentorship
    attributes:
      label: Mentorship updates
      description: Add, remove, or revise students and co-supervision information.
      placeholder: |
        Students:
        Degree and class year:
        Co-supervisor:
        Recruiting or mentorship note:
    validations:
      required: false
  - type: textarea
    id: sources
    attributes:
      label: Source or verification links
      description: Add links to publisher pages, official pages, CVs, or other authoritative sources.
    validations:
      required: false
